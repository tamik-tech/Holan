<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Analytics · PlanDace Holo AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    body { background: #050505; color: #e8ede9; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,133,0.1); backdrop-filter: blur(20px); border-radius: 24px; }
    input[type=range] { accent-color: #00FF85; cursor: pointer; height: 6px; }
    .fade-in { opacity: 0; transform: translateY(10px); animation: fadeIn 0.6s forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="pb-10">

  <header class="relative z-50 max-w-6xl mx-auto px-5 py-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-[#00FF85] flex items-center justify-center">
          <i data-lucide="leaf" class="text-black w-4 h-4"></i>
        </div>
        <span class="font-display font-bold text-xl tracking-tight text-white">Plan<span class="text-[#00FF85]">dace</span></span>
      </div>
      <div class="flex md:hidden">
        <a href="index.html" class="w-11 h-11 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl">
          <i data-lucide="home" class="w-5 h-5 text-white"></i>
        </a>
      </div>
      <nav class="hidden md:flex items-center gap-8 text-sm text-white/40">
        <a href="index.html" class="hover:text-white transition-colors">Главная</a>
        <a href="#" class="text-[#00FF85]">Аналитика</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
    
    <aside class="lg:col-span-4 space-y-6 fade-in">
      <div class="glass p-6">
        <h3 class="text-xs font-bold uppercase tracking-widest text-white/50 mb-8 flex items-center gap-2">
          <i data-lucide="settings-2" class="w-4 h-4 text-mint"></i> Настройка условий
        </h3>
        
        <div class="space-y-10">
          <div>
            <div class="flex justify-between mb-3">
              <label class="text-[10px] uppercase text-white/40">Температура</label>
              <span id="lblTemp" class="text-mint text-xs font-bold">24°C</span>
            </div>
            <input type="range" id="inputTemp" min="0" max="50" value="24" class="w-full" oninput="updateDashboard()">
          </div>

          <div>
            <div class="flex justify-between mb-3">
              <label class="text-[10px] uppercase text-white/40">Влажность почвы</label>
              <span id="lblHum" class="text-mint text-xs font-bold">65%</span>
            </div>
            <input type="range" id="inputHum" min="0" max="100" value="65" class="w-full" oninput="updateDashboard()">
          </div>

          <div>
            <div class="flex justify-between mb-3">
              <label class="text-[10px] uppercase text-white/40">Уровень Азота (N)</label>
              <span id="lblNitro" class="text-mint text-xs font-bold">75%</span>
            </div>
            <input type="range" id="inputNitro" min="0" max="100" value="75" class="w-full" oninput="updateDashboard()">
          </div>
        </div>
      </div>
    </aside>

    <div class="lg:col-span-8 space-y-6 fade-in" style="animation-delay: 0.15s">
      <div class="glass p-8">
        <div class="flex justify-between items-start mb-10">
          <div>
            <p class="text-[10px] uppercase tracking-[0.2em] text-white/30 mb-1">Прогноз урожайности</p>
            <h2 id="yieldDisplay" class="font-display font-black text-5xl text-[#00FF85]">28.4 <span class="text-xl font-normal text-white/20 uppercase">ц/га</span></h2>
          </div>
          <div id="statusTag" class="px-3 py-1 rounded-full border border-mint/20 text-mint text-[10px] font-bold uppercase">Optimal</div>
        </div>
        
        <div class="h-[350px]">
          <canvas id="yieldChart"></canvas>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="glass p-5">
          <div class="text-[9px] uppercase text-white/30 mb-1">Эффективность</div>
          <div id="effVal" class="text-xl font-bold text-white">94%</div>
        </div>
        <div class="glass p-5">
          <div class="text-[9px] uppercase text-white/30 mb-1">Риск стресса</div>
          <div id="riskVal" class="text-xl font-bold text-mint">Low</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    const ctx = document.getElementById('yieldChart').getContext('2d');
    
    // Градиент для заливки
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(0, 255, 133, 0.2)');
    gradient.addColorStop(1, 'rgba(0, 255, 133, 0)');

    const yieldChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Май', 'Июнь', 'Июль', 'Авг', 'Прогноз'],
        datasets: [{
          label: 'Урожайность',
          // Начальные адекватные данные, чтобы не было нуля
          data: [5.2, 12.8, 24.5, 26.0, 28.4],
          borderColor: '#00FF85',
          borderWidth: 3,
          backgroundColor: gradient,
          fill: true,
          tension: 0.4,
          pointRadius: 6,
          pointHoverRadius: 8,
          pointBackgroundColor: '#00FF85',
          pointBorderColor: '#050505',
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { 
            min: 0, 
            max: 50, 
            grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }, 
            ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 10 } } 
          },
          x: { 
            grid: { display: false }, 
            ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 10 } } 
          }
        }
      }
    });

    function updateDashboard() {
      const temp = parseFloat(document.getElementById('inputTemp').value);
      const hum = parseFloat(document.getElementById('inputHum').value);
      const nitro = parseFloat(document.getElementById('inputNitro').value);

      document.getElementById('lblTemp').innerText = temp + '°C';
      document.getElementById('lblHum').innerText = hum + '%';
      document.getElementById('lblNitro').innerText = nitro + '%';

      // Логика расчета (Max 40)
      let kTemp = 1.0 - Math.abs(24 - temp) * 0.035;
      let kHum = 1.0 - Math.abs(65 - hum) * 0.018;
      let currentYield = (nitro * 0.4) * Math.max(0.1, kTemp) * Math.max(0.1, kHum);
      
      currentYield = Math.max(0, Math.min(40, currentYield));

      // Обновляем текст
      document.getElementById('yieldDisplay').innerHTML = currentYield.toFixed(1) + ' <span class="text-xl font-normal text-white/20 uppercase">ц/га</span>';

      // ОБНОВЛЕНИЕ ГРАФИКА:
      // Оставляем Май-Июль как исторические данные, меняем только Август и Прогноз
      yieldChart.data.datasets[0].data[3] = parseFloat((currentYield * 0.92).toFixed(1)); // Август чуть ниже прогноза
      yieldChart.data.datasets[0].data[4] = parseFloat(currentYield.toFixed(1)); // Прогноз
      yieldChart.update();

      // Эффективность и статус
      let eff = Math.round(Math.max(0, (kTemp * kHum) * 100));
      document.getElementById('effVal').innerText = eff + '%';

      const risk = document.getElementById('riskVal');
      const tag = document.getElementById('statusTag');

      if (eff > 75) {
        risk.innerText = "Low"; risk.className = "text-xl font-bold text-mint";
        tag.innerText = "Optimal"; tag.className = "px-3 py-1 rounded-full border border-mint/20 text-mint text-[10px] font-bold uppercase";
      } else if (eff > 40) {
        risk.innerText = "Medium"; risk.className = "text-xl font-bold text-yellow-500";
        tag.innerText = "Warning"; tag.className = "px-3 py-1 rounded-full border border-yellow-500/20 text-yellow-500 text-[10px] font-bold uppercase";
      } else {
        risk.innerText = "High"; risk.className = "text-xl font-bold text-red-500";
        tag.innerText = "Danger"; tag.className = "px-3 py-1 rounded-full border border-red-500/20 text-red-500 text-[10px] font-bold uppercase";
      }
    }

    window.onload = updateDashboard;
  </script>
</body>
</html>
