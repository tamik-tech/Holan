<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Analytics · PlanDace Holo AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    body { background: #050505; color: #e8ede9; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,133,0.1); backdrop-filter: blur(20px); border-radius: 24px; }
    input[type=range] { accent-color: #00FF85; cursor: pointer; height: 6px; }
    .fade-in { opacity: 0; transform: translateY(10px); animation: fadeIn 0.6s forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    
    /* Стили для мобильных кнопок */
    .mobile-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="pb-10">

  <header class="relative z-50 max-w-6xl mx-auto px-5 py-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-[#00FF85] flex items-center justify-center">
          <i data-lucide="leaf" class="text-black w-4 h-4"></i>
        </div>
        <span class="font-display font-bold text-xl tracking-tight text-white">Plan<span class="text-[#00FF85]">dace</span></span>
      </div>

      <nav class="hidden md:flex items-center gap-8 text-sm text-white/40">
        <a href="index.html" class="hover:text-white transition-colors">Главная</a>
        <a href="#" class="text-[#00FF85]">Аналитика</a>
      </nav>

      <div class="flex md:hidden">
        <a href="index.html" class="mobile-btn">
          <i data-lucide="home" class="w-5 h-5 text-white"></i>
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
    
    <aside class="lg:col-span-4 space-y-6 fade-in">
      <div class="glass p-6">
        <h3 class="text-xs font-bold uppercase tracking-widest text-white/50 mb-8 flex items-center gap-2">
          <i data-lucide="settings-2" class="w-4 h-4 text-mint"></i> Настройка условий
        </h3>
        
        <div class="space-y-10">
          <div>
            <div class="flex justify-between mb-3">
              <label class="text-[10px] uppercase text-white/40">Температура</label>
              <span id="lblTemp" class="text-mint text-xs font-bold">24°C</span>
            </div>
            <input type="range" id="inputTemp" min="0" max="50" value="24" class="w-full" oninput="updateDashboard()">
          </div>

          <div>
            <div class="flex justify-between mb-3">
              <label class="text-[10px] uppercase text-white/40">Влажность почвы</label>
              <span id="lblHum" class="text-mint text-xs font-bold">65%</span>
            </div>
            <input type="range" id="inputHum" min="0" max="100" value="65" class="w-full" oninput="updateDashboard()">
          </div>

          <div>
            <div class="flex justify-between mb-3">
              <label class="text-[10px] uppercase text-white/40">Уровень Азота (N)</label>
              <span id="lblNitro" class="text-mint text-xs font-bold">75%</span>
            </div>
            <input type="range" id="inputNitro" min="0" max="100" value="75" class="w-full" oninput="updateDashboard()">
          </div>
        </div>
      </div>

      <div class="glass p-5 border-[#00FF85]/10">
        <p class="text-[10px] text-white/30 leading-relaxed uppercase tracking-tighter">
          Модель расчета: <span class="text-white/60 text-[11px]">Max Yield Cap 40 ц/га</span>
        </p>
      </div>
    </aside>

    <div class="lg:col-span-8 space-y-6 fade-in" style="animation-delay: 0.15s">
      <div class="glass p-8">
        <div class="flex justify-between items-start mb-10">
          <div>
            <p class="text-[10px] uppercase tracking-[0.2em] text-white/30 mb-1">Прогноз урожайности</p>
            <h2 id="yieldDisplay" class="font-display font-black text-5xl text-[#00FF85]">0.0 <span class="text-xl font-normal text-white/20 uppercase">ц/га</span></h2>
          </div>
          <div id="statusTag" class="px-3 py-1 rounded-full border border-mint/20 text-mint text-[10px] font-bold uppercase">
            Optimal
          </div>
        </div>
        
        <div class="h-[320px]">
          <canvas id="yieldChart"></canvas>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div class="glass p-5">
          <div class="text-[9px] uppercase text-white/30 mb-1">Эффективность</div>
          <div id="effVal" class="text-xl font-bold">0%</div>
        </div>
        <div class="glass p-5">
          <div class="text-[9px] uppercase text-white/30 mb-1">Риск стресса</div>
          <div id="riskVal" class="text-xl font-bold text-mint">Low</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    // Настройка графика
    const ctx = document.getElementById('yieldChart').getContext('2d');
    const yieldChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Май', 'Июнь', 'Июль', 'Авг', 'Прогноз'],
        datasets: [{
          data: [5, 12, 22, 28, 30],
          borderColor: '#00FF85',
          borderWidth: 3,
          backgroundColor: 'rgba(0, 255, 133, 0.05)',
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: '#00FF85',
          pointBorderColor: '#050505'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { 
            min: 0, 
            max: 50, // Шкала до 50, чтобы 40 ц/га смотрелось красиво
            grid: { color: 'rgba(255,255,255,0.03)' }, 
            ticks: { color: '#444', font: { size: 10 } } 
          },
          x: { grid: { display: false }, ticks: { color: '#444', font: { size: 10 } } }
        }
      }
    });

    function updateDashboard() {
      // 1. Получаем входные данные
      const temp = parseFloat(document.getElementById('inputTemp').value);
      const hum = parseFloat(document.getElementById('inputHum').value);
      const nitro = parseFloat(document.getElementById('inputNitro').value);

      // 2. Обновляем текст в интерфейсе
      document.getElementById('lblTemp').innerText = temp + '°C';
      document.getElementById('lblHum').innerText = hum + '%';
      document.getElementById('lblNitro').innerText = nitro + '%';

      // 3. МАТЕМАТИКА (Лимиты: 0 - 40 ц/га)
      // Температурный коэффициент (Пик на 24 градусах)
      let kTemp = 1.0 - Math.abs(24 - temp) * 0.04; 
      // Влажность (Пик на 65%)
      let kHum = 1.0 - Math.abs(65 - hum) * 0.02;

      // Базовая урожайность: Азот 100% = 40 ц/га
      let result = (nitro * 0.4) * kTemp * kHum;

      // Финальные ограничения
      result = Math.max(0, Math.min(40, result));

      // 4. ВЫВОД ДАННЫХ
      document.getElementById('yieldDisplay').innerHTML = result.toFixed(1) + ' <span class="text-xl font-normal text-white/20 uppercase">ц/га</span>';
      
      // Обновление графика
      yieldChart.data.datasets[0].data[4] = parseFloat(result.toFixed(1));
      yieldChart.data.datasets[0].data[3] = parseFloat((result * 0.85).toFixed(1));
      yieldChart.update('none');

      // Эффективность
      let eff = Math.round(Math.max(0, (kTemp * kHum) * 100));
      document.getElementById('effVal').innerText = eff + '%';

      // Риски и статусы
      const risk = document.getElementById('riskVal');
      const tag = document.getElementById('statusTag');

      if (eff > 75) {
        risk.innerText = "Low"; risk.style.color = "#00FF85";
        tag.innerText = "Optimal"; tag.style.color = "#00FF85"; tag.style.borderColor = "rgba(0,255,133,0.3)";
      } else if (eff > 40) {
        risk.innerText = "Medium"; risk.style.color = "#fbbf24";
        tag.innerText = "Warning"; tag.style.color = "#fbbf24"; tag.style.borderColor = "rgba(251,191,36,0.3)";
      } else {
        risk.innerText = "High"; risk.style.color = "#ef4444";
        tag.innerText = "Danger"; tag.style.color = "#ef4444"; tag.style.borderColor = "rgba(239,68,68,0.3)";
      }
    }

    // Инициализация при загрузке
    window.onload = updateDashboard;
  </script>
</body>
</html>
