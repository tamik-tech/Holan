<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Analytics · PlanDace Holo AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    body { background: #050505; color: #e8ede9; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,133,0.1); backdrop-filter: blur(20px); border-radius: 24px; }
    input[type=range] { accent-color: #00FF85; cursor: pointer; }
    .fade-in { opacity: 0; transform: translateY(10px); animation: fadeIn 0.6s forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="pb-10">

  <header class="relative z-50 max-w-6xl mx-auto px-5 py-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-[#00FF85] flex items-center justify-center">
          <i data-lucide="leaf" class="text-black w-4 h-4"></i>
        </div>
        <span class="font-display font-bold text-xl tracking-tight text-white">Plan<span class="text-[#00FF85]">dace</span></span>
      </div>

      <nav class="hidden md:flex items-center gap-8 text-sm text-white/40">
        <a href="index.html" class="hover:text-white transition-colors">Главная</a>
        <a href="#" class="text-[#00FF85]">Аналитика</a>
      </nav>

      <div class="flex md:hidden gap-2">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl">
          <i data-lucide="home" class="w-5 h-5 text-white"></i>
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
    
    <aside class="lg:col-span-4 space-y-6 fade-in">
      <div class="glass p-6">
        <h3 class="text-sm font-bold uppercase tracking-widest text-white/50 mb-6 flex items-center gap-2">
          <i data-lucide="sliders" class="w-4 h-4 text-mint"></i> Параметры
        </h3>
        
        <div class="space-y-8">
          <div>
            <label class="text-[10px] uppercase text-white/30 mb-3 block">Температура (°C)</label>
            <input type="range" id="inputTemp" min="0" max="50" value="24" class="w-full" oninput="updateDashboard()">
            <div id="lblTemp" class="text-mint text-xs mt-2 font-bold">24°C</div>
          </div>

          <div>
            <label class="text-[10px] uppercase text-white/30 mb-3 block">Влажность (%)</label>
            <input type="range" id="inputHum" min="0" max="100" value="65" class="w-full" oninput="updateDashboard()">
            <div id="lblHum" class="text-mint text-xs mt-2 font-bold">65%</div>
          </div>

          <div>
            <label class="text-[10px] uppercase text-white/30 mb-3 block">Азот в почве (N, %)</label>
            <input type="range" id="inputNitro" min="0" max="100" value="75" class="w-full" oninput="updateDashboard()">
            <div id="lblNitro" class="text-mint text-xs mt-2 font-bold">75%</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="lg:col-span-8 space-y-6 fade-in" style="animation-delay: 0.2s">
      <div class="glass p-8">
        <div class="mb-8">
          <p class="text-[10px] uppercase tracking-[0.2em] text-white/30 mb-1">Ожидаемый сбор</p>
          <h2 id="yieldDisplay" class="font-display font-black text-5xl text-[#00FF85]">185 <span class="text-xl font-normal text-white/20 uppercase">ц/га</span></h2>
        </div>
        
        <div class="h-[300px]">
          <canvas id="yieldChart"></canvas>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div class="glass p-5">
          <div class="text-[9px] uppercase text-white/30 mb-1">Эффективность</div>
          <div id="effVal" class="text-xl font-bold">94%</div>
        </div>
        <div class="glass p-5">
          <div class="text-[9px] uppercase text-white/30 mb-1">Статус</div>
          <div id="statusVal" class="text-xl font-bold text-mint">Optimal</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Инициализация иконок
    lucide.createIcons();

    // Создание графика
    const ctx = document.getElementById('yieldChart').getContext('2d');
    const yieldChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Май', 'Июнь', 'Июль', 'Авг', 'Прогноз'],
        datasets: [{
          data: [40, 90, 140, 165, 185],
          borderColor: '#00FF85',
          borderWidth: 3,
          backgroundColor: 'rgba(0, 255, 133, 0.05)',
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: '#00FF85'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 400, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#555' } },
          x: { grid: { display: false }, ticks: { color: '#555' } }
        }
      }
    });

    function updateDashboard() {
      // Получаем значения
      const temp = parseFloat(document.getElementById('inputTemp').value);
      const hum = parseFloat(document.getElementById('inputHum').value);
      const nitro = parseFloat(document.getElementById('inputNitro').value);

      // Обновляем текст под ползунками
      document.getElementById('lblTemp').innerText = temp + '°C';
      document.getElementById('lblHum').innerText = hum + '%';
      document.getElementById('lblNitro').innerText = nitro + '%';

      // Математика (Расчет в Центнерах)
      let kTemp = 1.0 - Math.abs(24 - temp) * 0.035;
      let kHum = 1.0 - Math.abs(65 - hum) * 0.015;
      let result = (nitro * 3.8) * kTemp * kHum; // 3.8 — коэффициент для ц/га
      
      result = Math.max(5, Math.min(400, result)); // Лимиты

      // Вывод на экран
      document.getElementById('yieldDisplay').innerHTML = Math.round(result) + ' <span class="text-xl font-normal text-white/20 uppercase">ц/га</span>';
      
      // Обновление графика (последняя точка)
      yieldChart.data.datasets[0].data[4] = Math.round(result);
      yieldChart.data.datasets[0].data[3] = Math.round(result * 0.88);
      yieldChart.update('none');

      // Статус и эффективность
      let eff = Math.round(Math.max(0, (kTemp * kHum) * 100));
      document.getElementById('effVal').innerText = eff + '%';
      
      const status = document.getElementById('statusVal');
      if (eff > 80) { status.innerText = "Optimal"; status.className = "text-xl font-bold text-mint"; }
      else if (eff > 50) { status.innerText = "Normal"; status.className = "text-xl font-bold text-yellow-500"; }
      else { status.innerText = "Risk"; status.className = "text-xl font-bold text-red-500"; }
    }

    // Первый запуск при загрузке
    window.onload = updateDashboard;
  </script>
</body>
</html>
